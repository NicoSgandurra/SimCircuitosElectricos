<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solucionador Karnaugh Pro</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- React & ReactDOM (Producción) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (Compila JSX a JS nativo en tiempo real) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Estilos Personalizados y Animaciones -->
    <style>
        @keyframes overlayPop {
            0% {
                transform: scale(0.85);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes modalFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-modal {
            animation: modalFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Scrollbar Personalizada Claro */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        /* Scrollbar Personalizada Oscuro */
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #333;
            border: 2px solid #0a0a0a;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #555;
        }
    </style>
</head>

<body class="bg-slate-50">
    <div id="root"></div>

    <!-- CÓDIGO DE LA APLICACIÓN -->
    <script type="text/babel">
        const { useState, useMemo, useEffect, Fragment } = React;

        // --- ICONOS INLINE ---
        const Icon = ({ children, size = 24, className = "", title }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {title && <title>{title}</title>}
                {children}
            </svg>
        );
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" /></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></Icon>;
        const Trash2 = (p) => <Icon {...p}><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" /></Icon>;
        const Layers = (p) => <Icon {...p}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" /><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65" /><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65" /></Icon>;
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></Icon>;
        const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
        const Copy = (p) => <Icon {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></Icon>;
        const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5" /></Icon>;

        // --- LÓGICA DEL SOLUCIONADOR ---

        const generateAllTerms = (numVars, inputNames) => {
            const terms = [];
            const totalTerms = Math.pow(3, numVars);

            for (let i = 0; i < totalTerms; i++) {
                let temp = i;
                let mask = 0;
                let val = 0;
                let termParts = [];

                for (let v = numVars - 1; v >= 0; v--) {
                    let state = temp % 3;
                    temp = Math.floor(temp / 3);
                    let bit = 1 << v;
                    if (state === 1) {
                        mask |= bit;
                        termParts.push({ varName: inputNames[numVars - 1 - v] || '?', isNegated: true });
                    } else if (state === 2) {
                        mask |= bit;
                        val |= bit;
                        termParts.push({ varName: inputNames[numVars - 1 - v] || '?', isNegated: false });
                    }
                }

                let cells = [];
                const numCells = 1 << numVars;
                for (let c = 0; c < numCells; c++) {
                    if ((c & mask) === val) cells.push(c);
                }
                terms.push({ termParts, mask, val, cells, size: cells.length });
            }
            terms.sort((a, b) => b.size - a.size);
            return terms;
        };

        const solveKMap = (cellsArray, allTerms, numVars) => {
            const minterms = [];
            const allowed = [];
            const numCells = 1 << numVars;

            for (let i = 0; i < numCells; i++) {
                if (cellsArray[i] === 1) {
                    minterms.push(i);
                    allowed.push(i);
                } else if (cellsArray[i] === 'X') {
                    allowed.push(i);
                }
            }

            if (minterms.length === 0) return { isZero: true, isOne: false, terms: [] };
            if (allowed.length === numCells) {
                const fullTerm = allTerms.find(t => t.size === numCells);
                return { isZero: false, isOne: true, terms: [fullTerm] };
            }

            const validTerms = allTerms.filter(t =>
                t.cells.some(c => minterms.includes(c)) &&
                t.cells.every(c => allowed.includes(c))
            );

            let uncoveredMinterms = new Set(minterms);
            const selectedTerms = [];

            for (let m of minterms) {
                if (!uncoveredMinterms.has(m)) continue;
                const coveringTerms = validTerms.filter(t => t.cells.includes(m));
                if (coveringTerms.length === 1) {
                    const epi = coveringTerms[0];
                    selectedTerms.push(epi);
                    epi.cells.forEach(c => uncoveredMinterms.delete(c));
                }
            }

            while (uncoveredMinterms.size > 0) {
                let bestTerm = null;
                let maxCovered = 0;

                for (const term of validTerms) {
                    if (selectedTerms.includes(term)) continue;
                    let covered = 0;
                    for (const c of term.cells) {
                        if (uncoveredMinterms.has(c)) covered++;
                    }
                    if (covered > maxCovered) {
                        maxCovered = covered;
                        bestTerm = term;
                    }
                }

                if (bestTerm) {
                    selectedTerms.push(bestTerm);
                    bestTerm.cells.forEach(c => uncoveredMinterms.delete(c));
                } else break;
            }

            return { isZero: false, isOne: false, terms: selectedTerms };
        };

        const getMapConfigs = (numVars, names) => {
            const s = names.map(n => n || '?');
            switch (numVars) {
                case 2: return [{ matrix: [[0, 1], [2, 3]], rowLabels: ['0', '1'], colLabels: ['0', '1'], label: `${s[0]}\\${s[1]}` }];
                case 3: return [{ matrix: [[0, 1, 3, 2], [4, 5, 7, 6]], rowLabels: ['0', '1'], colLabels: ['00', '01', '11', '10'], label: `${s[0]}\\${s[1]}${s[2]}` }];
                case 4: return [{ matrix: [[0, 1, 3, 2], [4, 5, 7, 6], [12, 13, 15, 14], [8, 9, 11, 10]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[0]}${s[1]}\\${s[2]}${s[3]}` }];
                case 5: return [
                    { title: `${s[0]} = 0`, matrix: [[0, 1, 3, 2], [4, 5, 7, 6], [12, 13, 15, 14], [8, 9, 11, 10]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[1]}${s[2]}\\${s[3]}${s[4]}` },
                    { title: `${s[0]} = 1`, matrix: [[16, 17, 19, 18], [20, 21, 23, 22], [28, 29, 31, 30], [24, 25, 27, 26]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[1]}${s[2]}\\${s[3]}${s[4]}` }
                ];
                case 6: return [
                    { title: `${s[0]}${s[1]} = 00`, matrix: [[0, 1, 3, 2], [4, 5, 7, 6], [12, 13, 15, 14], [8, 9, 11, 10]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[2]}${s[3]}\\${s[4]}${s[5]}` },
                    { title: `${s[0]}${s[1]} = 01`, matrix: [[16, 17, 19, 18], [20, 21, 23, 22], [28, 29, 31, 30], [24, 25, 27, 26]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[2]}${s[3]}\\${s[4]}${s[5]}` },
                    { title: `${s[0]}${s[1]} = 11`, matrix: [[48, 49, 51, 50], [52, 53, 55, 54], [60, 61, 63, 62], [56, 57, 59, 58]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[2]}${s[3]}\\${s[4]}${s[5]}` },
                    { title: `${s[0]}${s[1]} = 10`, matrix: [[32, 33, 35, 34], [36, 37, 39, 38], [44, 45, 47, 46], [40, 41, 43, 42]], rowLabels: ['00', '01', '11', '10'], colLabels: ['00', '01', '11', '10'], label: `${s[2]}${s[3]}\\${s[4]}${s[5]}` }
                ];
                default: return [];
            }
        };

        const termColors = [
            { border: '#ef4444', bg: 'rgba(239, 68, 68, 0.25)', text: 'text-red-600 dark:text-red-500' },
            { border: '#3b82f6', bg: 'rgba(59, 130, 246, 0.25)', text: 'text-blue-600 dark:text-blue-500' },
            { border: '#10b981', bg: 'rgba(16, 185, 129, 0.25)', text: 'text-emerald-600 dark:text-emerald-500' },
            { border: '#f59e0b', bg: 'rgba(245, 158, 11, 0.25)', text: 'text-amber-600 dark:text-amber-500' },
            { border: '#a855f7', bg: 'rgba(168, 85, 247, 0.25)', text: 'text-purple-600 dark:text-purple-500' },
            { border: '#ec4899', bg: 'rgba(236, 72, 153, 0.25)', text: 'text-pink-600 dark:text-pink-500' },
            { border: '#06b6d4', bg: 'rgba(6, 182, 212, 0.25)', text: 'text-cyan-600 dark:text-cyan-500' },
            { border: '#f97316', bg: 'rgba(249, 115, 22, 0.25)', text: 'text-orange-600 dark:text-orange-500' },
            { border: '#6366f1', bg: 'rgba(99, 102, 241, 0.25)', text: 'text-indigo-600 dark:text-indigo-500' },
            { border: '#14b8a6', bg: 'rgba(20, 184, 166, 0.25)', text: 'text-teal-600 dark:text-teal-500' }
        ];

        // --- COMPONENTES UI ---

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, darkMode }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                    <div className={`w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-modal ${darkMode ? 'bg-[#151515] border border-[#333] text-white' : 'bg-white border border-slate-200 text-slate-800'}`}>
                        <h3 className="text-lg font-bold mb-2">{title}</h3>
                        <p className={`text-sm mb-6 ${darkMode ? 'text-gray-400' : 'text-slate-600'}`}>{message}</p>
                        <div className="flex justify-end gap-3">
                            <button
                                onClick={onCancel}
                                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${darkMode ? 'bg-[#2a2a2a] hover:bg-[#3a3a3a] text-gray-300' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}
                            >
                                Cancelar
                            </button>
                            <button
                                onClick={onConfirm}
                                className="px-4 py-2 rounded-lg text-sm font-semibold transition-colors bg-red-500 hover:bg-red-600 text-white shadow-md shadow-red-500/20"
                            >
                                Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const TermDisplay = ({ termParts, className }) => {
            if (!termParts || termParts.length === 0) return <span className={className}>1</span>;
            return (
                <span className={className}>
                    {termParts.map((p, i) => (
                        <span key={i} className={p.isNegated ? "overline decoration-2 font-bold px-0.5" : "font-bold px-0.5"}>
                            {p.varName}
                        </span>
                    ))}
                </span>
            );
        };

        const KMapMatrix = ({ config, activeOutput, toggleValue, solvedData, darkMode }) => {
            const { matrix, rowLabels, colLabels, label, title } = config;
            const rows = matrix.length;
            const cols = matrix[0].length;

            return (
                <div className={`flex flex-col items-center justify-center p-6 md:p-8 rounded-[2rem] transition-colors ${darkMode ? 'bg-[#0f0f0f] border border-[#222] shadow-2xl shadow-black/50' : 'bg-white/60 backdrop-blur-3xl border border-white/60 shadow-xl shadow-slate-200/50'}`}>
                    {title && (
                        <h4 className={`mb-8 font-mono text-xs tracking-widest uppercase font-bold py-1.5 px-4 rounded-full ${darkMode ? 'bg-[#222] text-gray-300' : 'bg-white shadow-sm text-slate-700 border border-slate-200'}`}>
                            {title}
                        </h4>
                    )}

                    <div className="relative w-full max-w-[340px]">
                        <div className="flex ml-[12%] w-[88%] mb-3 text-center text-[11px] font-mono font-bold tracking-wider">
                            {colLabels.map((l, i) => <div key={i} className="flex justify-center items-center" style={{ width: `${100 / cols}%` }}><span className={darkMode ? 'bg-[#222] text-gray-300 px-2 py-0.5 rounded' : 'bg-white text-slate-700 shadow-sm border border-slate-100 px-2 py-0.5 rounded'}>{l}</span></div>)}
                        </div>

                        <div className="flex relative">
                            <div className="absolute -top-7 -left-5 text-[10px] font-mono font-bold uppercase tracking-widest bg-gradient-to-br from-indigo-500 to-purple-600 text-transparent bg-clip-text drop-shadow-sm">{label}</div>

                            <div className="w-[12%] flex flex-col justify-around text-[11px] font-mono font-bold tracking-wider text-right pr-2 md:pr-3">
                                {rowLabels.map((l, i) => <div key={i} style={{ height: `${100 / rows}%` }} className="flex items-center justify-end"><span className={darkMode ? 'bg-[#222] text-gray-300 px-1.5 py-0.5 rounded' : 'bg-white text-slate-700 shadow-sm border border-slate-100 px-1.5 py-0.5 rounded'}>{l}</span></div>)}
                            </div>

                            <div className="w-[88%] relative" style={{ aspectRatio: `${cols}/${rows}` }}>
                                <div
                                    className={`grid w-full h-full gap-[1px] relative z-10 rounded-xl overflow-hidden border shadow-inner ${darkMode ? 'bg-[#333] border-[#333]' : 'bg-slate-200 border-slate-200'}`}
                                    style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${rows}, minmax(0, 1fr))` }}
                                >
                                    {matrix.flat().map((logicalIndex) => {
                                        const val = activeOutput.values[logicalIndex];
                                        return (
                                            <button
                                                key={`cell-${logicalIndex}`}
                                                onClick={() => toggleValue(logicalIndex)}
                                                className={`relative flex items-center justify-center font-mono transition-all duration-300 group ${darkMode ? 'bg-[#0a0a0a] hover:bg-[#151515]' : 'bg-white hover:bg-slate-50'}`}
                                            >
                                                {val === 1 ? (
                                                    <span className={`text-2xl sm:text-3xl font-black text-emerald-500 ${darkMode ? 'drop-shadow-[0_0_12px_rgba(16,185,129,0.8)]' : 'drop-shadow-[0_2px_4px_rgba(16,185,129,0.4)]'} scale-110`}>1</span>
                                                ) : val === 'X' ? (
                                                    <span className={`text-xl sm:text-2xl font-bold ${darkMode ? 'text-slate-400 drop-shadow-[0_0_8px_rgba(148,163,184,0.4)]' : 'text-slate-400'}`}>X</span>
                                                ) : (
                                                    <span className={`text-sm font-medium transition-opacity duration-300 ${darkMode ? 'text-slate-600 group-hover:text-slate-500' : 'text-slate-300 group-hover:text-slate-400'}`}>0</span>
                                                )}
                                                <span className={`absolute bottom-1 right-1.5 text-[9px] font-sans tracking-tighter font-semibold ${darkMode ? 'text-gray-600' : 'text-slate-400'}`}>{logicalIndex}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="absolute inset-0 pointer-events-none z-30 rounded-xl overflow-hidden">
                                    {solvedData.terms.map((term, tIndex) => {
                                        const localCells = term.cells.filter(c => matrix.flat().includes(c));
                                        if (localCells.length === 0) return null;

                                        const color = termColors[tIndex % termColors.length];

                                        return localCells.map(cell => {
                                            let r, c;
                                            matrix.forEach((row, rowIndex) => {
                                                row.forEach((colCell, colIndex) => {
                                                    if (colCell === cell) { r = rowIndex; c = colIndex; }
                                                });
                                            });

                                            const hasUp = localCells.includes(matrix[(r + rows - 1) % rows][c]);
                                            const hasDown = localCells.includes(matrix[(r + 1) % rows][c]);
                                            const hasLeft = localCells.includes(matrix[r][(c + cols - 1) % cols]);
                                            const hasRight = localCells.includes(matrix[r][(c + 1) % cols]);

                                            const rRadius = '10px';
                                            const borderThickness = '3px';

                                            const borderStyle = {
                                                borderTop: !hasUp ? `${borderThickness} solid ${color.border}` : 'none',
                                                borderBottom: !hasDown ? `${borderThickness} solid ${color.border}` : 'none',
                                                borderLeft: !hasLeft ? `${borderThickness} solid ${color.border}` : 'none',
                                                borderRight: !hasRight ? `${borderThickness} solid ${color.border}` : 'none',
                                                top: `${(r / rows) * 100}%`,
                                                left: `${(c / cols) * 100}%`,
                                                width: `${(1 / cols) * 100}%`,
                                                height: `${(1 / rows) * 100}%`,
                                                backgroundColor: color.bg,
                                                borderTopLeftRadius: (!hasUp && !hasLeft) ? rRadius : '0px',
                                                borderTopRightRadius: (!hasUp && !hasRight) ? rRadius : '0px',
                                                borderBottomLeftRadius: (!hasDown && !hasLeft) ? rRadius : '0px',
                                                borderBottomRightRadius: (!hasDown && !hasRight) ? rRadius : '0px',
                                                zIndex: 10 + tIndex,
                                                animation: `overlayPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1) ${tIndex * 0.05}s forwards`,
                                                opacity: 0,
                                            };

                                            return <div key={`overlay-${tIndex}-${cell}`} className="absolute box-border" style={borderStyle} />;
                                        });
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE DIAGRAMA LÓGICO ---

        const LogicDiagram = ({ solvedData, outputName, darkMode }) => {
            const Wire = ({ w = "w-6" }) => <div className={`h-[2px] ${w} ${darkMode ? 'bg-[#444]' : 'bg-slate-300'} shrink-0`}></div>;

            const FinalBadge = ({ text }) => (
                <div className={`w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full font-black font-mono text-sm md:text-lg border-2 shadow-md z-10 shrink-0 ${darkMode ? 'bg-blue-500/20 border-blue-500 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-blue-100 border-blue-500 text-blue-700 shadow-lg shadow-blue-500/20'}`}>
                    {text}
                </div>
            );

            const InputBadge = ({ p }) => (
                <div className={`px-2 md:px-3 py-1 md:py-1.5 flex items-center justify-center rounded-md font-bold font-mono text-xs md:text-sm border shadow-sm z-10 shrink-0 ${darkMode ? 'bg-[#151515] border-[#333] text-gray-200' : 'bg-white border-slate-200 text-slate-700'}`}>
                    <span className={p.isNegated ? "overline decoration-2" : ""}>{p.varName}</span>
                </div>
            );

            const BusAndGate = ({ items, type, darkMode }) => {
                if (items.length === 1) return items[0];

                const isAND = type === 'AND';
                const gateBg = isAND
                    ? (darkMode ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-400 shadow-[0_0_10px_rgba(99,102,241,0.2)]' : 'bg-indigo-50 border-indigo-200 text-indigo-700 shadow-sm')
                    : (darkMode ? 'bg-pink-500/20 border-pink-500/30 text-pink-400 shadow-[0_0_10px_rgba(236,72,153,0.2)]' : 'bg-pink-50 border-pink-200 text-pink-700 shadow-sm');

                // Estilo de forma visual: AND es plano de un lado y redondo del otro, OR es más ovalado
                const shape = isAND ? 'rounded-l-sm rounded-r-2xl' : 'rounded-3xl';

                return (
                    <div className="flex items-center shrink-0">
                        <div className="flex flex-col gap-3 md:gap-4 relative py-2 shrink-0">
                            {items.map((item, i) => (
                                <div key={i} className="flex items-center relative shrink-0">
                                    {item}
                                    <Wire w="w-4 md:w-8" />
                                    {/* Bus vertical que conecta los cables */}
                                    <div className={`absolute right-0 w-[2px] ${darkMode ? 'bg-[#444]' : 'bg-slate-300'}`}
                                        style={{
                                            top: i === 0 ? '50%' : '0',
                                            bottom: i === items.length - 1 ? '50%' : '0'
                                        }}>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <Wire w="w-4 md:w-8" />
                        <div className={`px-4 md:px-5 py-2 md:py-3 font-black text-[10px] md:text-xs tracking-widest border flex items-center justify-center z-10 shrink-0 ${gateBg} ${shape}`}>
                            {type}
                        </div>
                    </div>
                );
            };

            if (solvedData.isZero) {
                return <div className="flex items-center min-w-max p-4"><InputBadge p={{ varName: '0', isNegated: false }} /><Wire w="w-12" /><FinalBadge text={outputName} /></div>;
            }
            if (solvedData.isOne) {
                return <div className="flex items-center min-w-max p-4"><InputBadge p={{ varName: '1', isNegated: false }} /><Wire w="w-12" /><FinalBadge text={outputName} /></div>;
            }

            const termBlocks = solvedData.terms.map((term, tIdx) => {
                if (!term.termParts || term.termParts.length === 0) {
                    return <InputBadge key={tIdx} p={{ varName: '1', isNegated: false }} />;
                }
                const inputBadges = term.termParts.map((p, i) => <InputBadge key={`inp-${tIdx}-${i}`} p={p} />);
                return <BusAndGate key={`and-${tIdx}`} items={inputBadges} type="AND" darkMode={darkMode} />;
            });

            return (
                <div className="flex items-center min-w-max p-4 shrink-0">
                    <BusAndGate items={termBlocks} type="OR" darkMode={darkMode} />
                    <Wire w="w-6 md:w-12" />
                    <FinalBadge text={outputName} />
                </div>
            );
        };

        // --- APP PRINCIPAL ---

        function App() {
            const [darkMode, setDarkMode] = useState(false);
            const [numVars, setNumVars] = useState(4);

            const [inputNames, setInputNames] = useState(['A', 'B', 'C', 'D', 'E', 'F']);
            const [outputs, setOutputs] = useState([{ id: 'out-1', name: 'F', values: Array(16).fill(0) }]);
            const [activeOutputId, setActiveOutputId] = useState('out-1');

            // Estado para la confirmación de borrado
            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [copied, setCopied] = useState(false);

            const ALL_TERMS = useMemo(() => generateAllTerms(numVars, inputNames), [numVars, inputNames]);
            const activeOutput = outputs.find(o => o.id === activeOutputId) || outputs[0];
            const solvedData = useMemo(() => solveKMap(activeOutput.values, ALL_TERMS, numVars), [activeOutput.values, ALL_TERMS, numVars]);
            const gridsToRender = useMemo(() => getMapConfigs(numVars, inputNames), [numVars, inputNames]);

            useEffect(() => {
                const newSize = 1 << numVars;
                setOutputs(prev => prev.map(o => {
                    if (o.values.length === newSize) return o;
                    const newVals = Array(newSize).fill(0);
                    for (let i = 0; i < Math.min(o.values.length, newSize); i++) newVals[i] = o.values[i];
                    return { ...o, values: newVals };
                }));
            }, [numVars]);

            const toggleOutputValue = (outputId, index) => {
                setOutputs(prev => prev.map(o => {
                    if (o.id !== outputId) return o;
                    const next = [...o.values];
                    next[index] = next[index] === 0 ? 1 : next[index] === 1 ? 'X' : 0;
                    return { ...o, values: next };
                }));
            };

            const addOutput = () => {
                const newId = `out-${Date.now()}`;
                setOutputs([...outputs, { id: newId, name: `F${outputs.length + 1}`, values: Array(1 << numVars).fill(0) }]);
                setActiveOutputId(newId);
            };

            // Funciones de limpieza y borrado con confirmación
            const requestRemoveOutput = (id, name) => {
                setConfirmState({
                    isOpen: true,
                    title: 'Eliminar Salida',
                    message: `¿Estás seguro de que deseas eliminar la función "${name}"?`,
                    onConfirm: () => {
                        const newOutputs = outputs.filter(o => o.id !== id);
                        setOutputs(newOutputs);
                        if (activeOutputId === id) setActiveOutputId(newOutputs[0].id);
                        setConfirmState(prev => ({ ...prev, isOpen: false }));
                    }
                });
            };

            const requestClearAllOutputs = () => {
                setConfirmState({
                    isOpen: true,
                    title: 'Limpiar Todo',
                    message: '¿Estás seguro de que deseas reiniciar todas las salidas a 0? Esta acción no se puede deshacer.',
                    onConfirm: () => {
                        setOutputs(prev => prev.map(o => ({ ...o, values: Array(1 << numVars).fill(0) })));
                        setConfirmState(prev => ({ ...prev, isOpen: false }));
                    }
                });
            };

            const handleCopyFunction = () => {
                let textToCopy = "";
                if (solvedData.isZero) textToCopy = "0";
                else if (solvedData.isOne) textToCopy = "1";
                else {
                    textToCopy = solvedData.terms.map(t => {
                        if (!t.termParts || t.termParts.length === 0) return "1";
                        return t.termParts.map(p => p.varName + (p.isNegated ? "'" : "")).join("");
                    }).join(" + ");
                }

                const fullText = `${activeOutput.name} = ${textToCopy}`;

                // Método compatible con todos los navegadores e iframes sin necesidad de permisos especiales
                const textArea = document.createElement("textarea");
                textArea.value = fullText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000); // Vuelve al ícono normal después de 2 segundos
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textArea);
            };

            const appBg = darkMode
                ? "bg-[#000] text-[#ededed] selection:bg-[#333]"
                : "bg-slate-50 text-slate-800 selection:bg-pink-200 relative overflow-x-hidden";

            const panelClass = darkMode
                ? "bg-[#0a0a0a] border border-[#222] rounded-xl shadow-none"
                : "bg-white/80 backdrop-blur-2xl border border-white/80 shadow-[0_8px_30px_rgb(0,0,0,0.06)] rounded-[2rem]";

            const tableHeaderClass = darkMode ? "bg-[#111] border-b border-[#222]" : "bg-white/60 border-b border-slate-200";
            const tableRowClass = darkMode ? "border-b border-[#1a1a1a] hover:bg-[#111]" : "border-b border-slate-100 hover:bg-slate-50";

            const numCells = 1 << numVars;

            return (
                <div className={`min-h-screen transition-colors duration-500 font-sans ${darkMode ? 'dark' : ''} ${appBg}`}>

                    <ConfirmModal
                        isOpen={confirmState.isOpen}
                        title={confirmState.title}
                        message={confirmState.message}
                        onConfirm={confirmState.onConfirm}
                        onCancel={() => setConfirmState(prev => ({ ...prev, isOpen: false }))}
                        darkMode={darkMode}
                    />

                    {!darkMode && (
                        <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-gradient-to-br from-pink-200/50 to-purple-200/50 blur-[100px]" />
                            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-gradient-to-br from-cyan-200/50 to-blue-200/50 blur-[100px]" />
                        </div>
                    )}

                    <div className="relative z-10 max-w-[1400px] mx-auto p-4 md:p-8 flex flex-col min-h-screen">

                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 shrink-0">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight flex items-center gap-2">
                                    <div className={`p-2 rounded-xl ${darkMode ? 'bg-[#222] text-white' : 'bg-gradient-to-br from-pink-500 to-violet-500 text-white shadow-md'}`}>
                                        <Zap size={20} className={darkMode ? "opacity-80" : ""} />
                                    </div>
                                    <span className={darkMode ? 'text-white' : 'text-slate-800'}>
                                        Karnaugh Solver Pro
                                    </span>
                                </h1>
                                <p className={`text-sm mt-1.5 ml-1 ${darkMode ? 'text-gray-500' : 'text-slate-500 font-medium'}`}>
                                    Simplificación Múltiple (HTML Independiente)
                                </p>
                            </div>

                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                <div className={`flex items-center p-1 rounded-full border ${darkMode ? 'bg-[#111] border-[#222]' : 'bg-white shadow-sm border-slate-200'}`}>
                                    <div className={`pl-3 pr-2 opacity-80 ${darkMode ? 'text-gray-400' : 'text-slate-500'}`}>
                                        <Layers size={16} />
                                    </div>
                                    {[2, 3, 4, 5, 6].map(n => (
                                        <button
                                            key={n}
                                            onClick={() => setNumVars(n)}
                                            className={`px-3 py-1.5 text-xs sm:text-sm font-bold rounded-full transition-all duration-300 ${numVars === n
                                                    ? darkMode ? 'bg-[#333] text-white shadow-sm' : 'bg-slate-800 text-white shadow-md'
                                                    : darkMode ? 'text-gray-500 hover:text-gray-300' : 'text-slate-600 hover:text-slate-900'
                                                }`}
                                        >
                                            {n}v
                                        </button>
                                    ))}
                                </div>

                                <div className="w-px h-8 bg-gray-300 dark:bg-[#333] mx-1 hidden sm:block"></div>

                                <button onClick={requestClearAllOutputs} className={`p-2.5 rounded-full transition-all flex items-center gap-2 ${darkMode ? 'bg-[#111] hover:bg-[#222] border border-[#222] text-red-500' : 'bg-white hover:bg-red-50 shadow-sm border border-slate-200 text-red-500'}`} title="Limpiar todo">
                                    <Trash2 size={18} />
                                </button>
                                <button onClick={() => setDarkMode(!darkMode)} className={`p-2.5 rounded-full transition-all ${darkMode ? 'bg-white text-black hover:bg-gray-200' : 'bg-slate-800 text-white shadow-md hover:bg-slate-700'}`} title="Modo Oscuro/Claro">
                                    {darkMode ? <Sun size={18} /> : <Moon size={18} />}
                                </button>
                            </div>
                        </header>

                        <div className="flex flex-col lg:flex-row gap-6 flex-1">

                            <div className={`lg:w-[35%] flex flex-col shrink-0 ${panelClass} h-fit overflow-hidden`}>
                                <div className={`p-4 font-bold text-xs tracking-widest uppercase flex justify-between items-center ${tableHeaderClass}`}>
                                    <span className={darkMode ? 'text-gray-300' : 'text-slate-700'}>Tabla de Verdad</span>
                                    <div className="flex items-center gap-2">
                                        <button onClick={addOutput} className={`p-1.5 rounded-md transition-colors flex items-center gap-1 ${darkMode ? 'bg-blue-500/20 text-blue-400 hover:bg-blue-500/30' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`} title="Añadir nueva función">
                                            <Plus size={14} />
                                            <span className="hidden sm:inline text-[10px] uppercase font-bold">Salida</span>
                                        </button>
                                        <span className={`px-2 py-1 rounded-md text-[10px] ${darkMode ? 'bg-[#222] text-gray-400' : 'bg-slate-200 text-slate-600'}`}>{numCells} filas</span>
                                    </div>
                                </div>

                                <div className="p-3 md:p-4 pt-2">
                                    <div className={`rounded-xl overflow-hidden border ${darkMode ? 'border-[#333] bg-[#0a0a0a]' : 'border-slate-200 bg-white shadow-sm'}`}>
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-center text-sm font-mono border-collapse min-w-max">
                                                <thead className={`sticky top-0 z-10 backdrop-blur-xl ${darkMode ? 'bg-[#111]/95' : 'bg-slate-50/95'}`}>
                                                    <tr className={`text-xs ${darkMode ? 'text-gray-300' : 'text-slate-700'}`}>
                                                        {/* ID HEADER (m) */}
                                                        <th className={`py-3 px-3 font-semibold text-xs border-r border-dashed border-b ${darkMode ? 'text-gray-500 border-[#333]' : 'text-slate-400 border-slate-200'}`}>m</th>

                                                        {/* INPUT HEADERS */}
                                                        {Array.from({ length: numVars }).map((_, vIdx) => (
                                                            <th key={`th-in-${vIdx}`} className={`py-3 font-bold px-2 border-b ${darkMode ? 'border-[#333]' : 'border-slate-200'}`}>
                                                                <input
                                                                    type="text"
                                                                    value={inputNames[vIdx]}
                                                                    onChange={(e) => {
                                                                        const newNames = [...inputNames];
                                                                        newNames[vIdx] = e.target.value.replace(/[^a-zA-Z0-9_]/g, '').slice(0, 4);
                                                                        setInputNames(newNames);
                                                                    }}
                                                                    className={`w-[40px] text-center bg-transparent border-b-2 border-transparent focus:border-blue-500 focus:outline-none transition-colors ${darkMode ? 'text-gray-200' : 'text-slate-800'}`}
                                                                />
                                                            </th>
                                                        ))}

                                                        {/* OUTPUT HEADERS */}
                                                        {outputs.map(out => (
                                                            <th
                                                                key={`th-out-${out.id}`}
                                                                className={`py-3 font-extrabold border-l border-dashed px-2 cursor-pointer transition-colors border-b ${darkMode ? 'border-[#333]' : 'border-slate-200'} ${activeOutputId === out.id ? 'text-blue-500' : ''}`}
                                                                onClick={() => setActiveOutputId(out.id)}
                                                            >
                                                                <div className="flex items-center justify-center gap-1 group">
                                                                    <input
                                                                        type="text"
                                                                        value={out.name}
                                                                        onChange={(e) => {
                                                                            setOutputs(prev => prev.map(o => o.id === out.id ? { ...o, name: e.target.value.replace(/[^a-zA-Z0-9_]/g, '').slice(0, 5) } : o));
                                                                        }}
                                                                        onClick={(e) => e.stopPropagation()}
                                                                        className="w-[45px] bg-transparent text-center focus:outline-none border-b-2 border-transparent focus:border-blue-500 transition-colors"
                                                                    />
                                                                    {outputs.length > 1 && (
                                                                        <button
                                                                            onClick={(e) => { e.stopPropagation(); requestRemoveOutput(out.id, out.name); }}
                                                                            className={`p-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity ${darkMode ? 'hover:bg-red-500/20 text-red-400' : 'hover:bg-red-100 text-red-500'}`}
                                                                            title="Eliminar función"
                                                                        >
                                                                            <Trash2 size={12} />
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </th>
                                                        ))}
                                                    </tr>
                                                </thead>

                                                <tbody>
                                                    {Array.from({ length: numCells }).map((_, i) => (
                                                        <tr key={i} className={`transition-colors ${tableRowClass}`}>
                                                            {/* ID CELL */}
                                                            <td className={`py-2.5 text-xs font-semibold border-r border-dashed ${darkMode ? 'text-gray-600 border-[#333]' : 'text-slate-400 border-slate-200'}`}>{i}</td>

                                                            {/* INPUT CELLS */}
                                                            {Array.from({ length: numVars }).map((_, vIdx) => (
                                                                <td key={`td-in-${vIdx}`} className={`py-2.5 font-medium ${darkMode ? 'text-slate-400' : 'text-slate-600'}`}>
                                                                    {(i >> (numVars - 1 - vIdx)) & 1}
                                                                </td>
                                                            ))}

                                                            {/* OUTPUT CELLS */}
                                                            {outputs.map(out => (
                                                                <td
                                                                    key={`td-out-${out.id}`}
                                                                    className={`py-2.5 border-l border-dashed transition-colors cursor-pointer ${darkMode ? 'border-[#333]' : 'border-slate-200'} ${activeOutputId === out.id ? (darkMode ? 'bg-blue-500/10' : 'bg-blue-50') : 'bg-transparent'} font-bold text-base`}
                                                                    onClick={() => { setActiveOutputId(out.id); toggleOutputValue(out.id, i); }}
                                                                >
                                                                    {out.values[i] === 1 ? <span className="text-emerald-500 drop-shadow-[0_0_5px_rgba(16,185,129,0.5)]">1</span> : out.values[i] === 'X' ? <span className={`text-xl ${darkMode ? 'text-slate-400' : 'text-slate-500'}`}>X</span> : <span className={`text-xs font-medium ${darkMode ? 'text-slate-600' : 'text-slate-400'}`}>0</span>}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:w-[65%] flex flex-col gap-6 pb-10">

                                <div className={`${panelClass} p-6 md:p-8 shrink-0 relative overflow-hidden flex flex-col justify-center min-h-[160px]`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex items-center gap-3">
                                            <h3 className={`font-bold text-xs tracking-widest uppercase ${darkMode ? 'text-gray-300' : 'text-slate-700'}`}>
                                                Función Simplificada
                                            </h3>
                                            <button
                                                onClick={handleCopyFunction}
                                                className={`p-1.5 rounded-md transition-all flex items-center gap-1.5 ${copied ? 'bg-emerald-500/20 text-emerald-600 dark:text-emerald-400' : darkMode ? 'bg-[#222] text-gray-400 hover:text-white hover:bg-[#333]' : 'bg-slate-100 text-slate-500 hover:text-slate-800 hover:bg-slate-200'}`}
                                                title="Copiar función"
                                            >
                                                {copied ? <Check size={14} /> : <Copy size={14} />}
                                                <span className="text-[10px] uppercase font-bold hidden sm:inline">{copied ? 'Copiado' : 'Copiar'}</span>
                                            </button>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${darkMode ? 'bg-blue-500/20 text-blue-400' : 'bg-blue-100 text-blue-700'}`}>
                                            Editando: {activeOutput.name}
                                        </span>
                                    </div>

                                    <div className="flex flex-wrap items-center gap-3 text-2xl md:text-4xl lg:text-5xl font-mono font-medium tracking-tight">
                                        <span className={darkMode ? 'text-slate-400' : 'text-slate-600'}>{activeOutput.name || '?'} = </span>
                                        {solvedData.isZero ? (
                                            <span className="text-gray-400 font-bold">0</span>
                                        ) : solvedData.isOne ? (
                                            <span className="text-emerald-500 font-bold">1</span>
                                        ) : (
                                            solvedData.terms.map((term, i) => (
                                                <Fragment key={i}>
                                                    <span className={`px-2 py-1 rounded-lg ${darkMode ? 'bg-[#111] border border-[#222]' : 'bg-white shadow-sm border border-slate-200'} ${termColors[i % termColors.length].text}`}>
                                                        <TermDisplay termParts={term.termParts} />
                                                    </span>
                                                    {i < solvedData.terms.length - 1 && (
                                                        <span className={`text-2xl ${darkMode ? 'text-slate-500' : 'text-slate-400'}`}>+</span>
                                                    )}
                                                </Fragment>
                                            ))
                                        )}
                                    </div>

                                    {solvedData.terms.length > 0 && !solvedData.isOne && !solvedData.isZero && (
                                        <div className="mt-6 flex flex-wrap gap-2">
                                            {solvedData.terms.map((term, i) => {
                                                const color = termColors[i % termColors.length];
                                                return (
                                                    <div key={i} className={`flex items-center gap-2 px-2.5 py-1 rounded-md text-xs font-semibold border ${darkMode ? 'bg-[#111] border-[#222] text-gray-300' : 'bg-white border-slate-200 text-slate-700 shadow-sm'}`}>
                                                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: color.border, boxShadow: `0 0 8px ${color.border}` }}></div>
                                                        Grupo de {term.cells.length}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>

                                <div className={`${panelClass} p-6 md:p-8 flex flex-col items-center justify-center relative`}>
                                    <h2 className={`self-start font-bold text-xs tracking-widest uppercase mb-8 ${darkMode ? 'text-gray-300' : 'text-slate-700'}`}>
                                        Mapa{numVars > 4 ? 's' : ''} de Karnaugh para {activeOutput.name}
                                    </h2>

                                    <div className={`w-full grid gap-10 ${numVars <= 4 ? 'grid-cols-1 max-w-[500px]' :
                                            numVars === 5 ? 'grid-cols-1 lg:grid-cols-2 max-w-[900px]' :
                                                'grid-cols-1 md:grid-cols-2 max-w-[900px]'
                                        }`}>
                                        {gridsToRender.map((config, index) => (
                                            <KMapMatrix
                                                key={index}
                                                config={config}
                                                activeOutput={activeOutput}
                                                toggleValue={(logicalIndex) => toggleOutputValue(activeOutput.id, logicalIndex)}
                                                solvedData={solvedData}
                                                darkMode={darkMode}
                                            />
                                        ))}
                                    </div>
                                </div>

                                {/* DIAGRAMA LÓGICO FULL WIDTH */}
                                <div className={`${panelClass} mt-6 mb-4 p-6 md:p-8 shrink-0 relative overflow-hidden flex flex-col justify-center min-h-[200px]`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <h3 className={`font-bold text-xs tracking-widest uppercase ${darkMode ? 'text-gray-300' : 'text-slate-700'}`}>
                                            Diagrama de Compuertas Lógicas
                                        </h3>
                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${darkMode ? 'bg-blue-500/20 text-blue-400' : 'bg-blue-100 text-blue-700'}`}>
                                            {activeOutput.name}
                                        </span>
                                    </div>

                                    <div className="flex-1 w-full overflow-x-auto custom-scrollbar flex items-center justify-start pb-4 md:pl-4">
                                        <LogicDiagram solvedData={solvedData} outputName={activeOutput.name} darkMode={darkMode} />
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Inicializar React y renderizar App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
